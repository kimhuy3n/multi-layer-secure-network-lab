version: '3.8'
# ============================================================
# DATN 2026 - Monitoring Stack
# Cai tren Ubuntu Server (srv-lan-01)
#
# Buoc 1: Cai Docker tren Ubuntu:
#   sudo apt install docker.io docker-compose -y
#   sudo usermod -aG docker huyen
#
# Buoc 2: Copy folder nay vao Ubuntu Server
# Buoc 3: Chay:
#   cd monitoring
#   docker-compose up -d
#
# Buoc 4: Truy cap Grafana:
#   http://192.168.10.101:3000
#   Login: admin / admin
# ============================================================

services:
  # Log collector
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  # Log shipper - doc log va gui ve Loki
  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/log:/var/log:ro
      - syslog-data:/var/log/syslog-ng:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  # Dashboard - hien thi tat ca
  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    restart: unless-stopped

  # Syslog receiver - nhan log tu pfSense
  syslog-ng:
    image: balabit/syslog-ng:latest
    ports:
      - "514:514/udp"
      - "514:514/tcp"
    volumes:
      - syslog-data:/var/log/syslog-ng
      - ./syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
    restart: unless-stopped

  # SOC Python - auto response daemon
  soc:
    build:
      context: ..
      dockerfile: monitoring/soc/Dockerfile
    env_file:
      - ../.env
    volumes:
      - soc-data:/data
    depends_on:
      - syslog-ng
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
  syslog-data:
  soc-data:
