server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # System logs
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: system
          host: srv-lan-01
          __path__: /var/log/syslog

  # Auth logs (fail2ban, SSH)
  - job_name: auth
    static_configs:
      - targets: [localhost]
        labels:
          job: auth
          host: srv-lan-01
          __path__: /var/log/auth.log

  # Apache logs
  - job_name: apache_access
    static_configs:
      - targets: [localhost]
        labels:
          job: apache
          type: access
          host: srv-lan-01
          __path__: /var/log/apache2/access.log

  - job_name: apache_error
    static_configs:
      - targets: [localhost]
        labels:
          job: apache
          type: error
          host: srv-lan-01
          __path__: /var/log/apache2/error.log

  # Auto-response incidents log
  - job_name: incidents
    static_configs:
      - targets: [localhost]
        labels:
          job: incidents
          host: srv-lan-01
          __path__: /var/log/incidents.log
