ansible_user: "{{ lookup('env', 'UBUNTU_USER') | default('huyen', true) }}"
ansible_password: "{{ lookup('env', 'UBUNTU_PASS') | default('CHANGE_ME', true) }}"
ansible_become: true
ansible_become_password: "{{ lookup('env', 'UBUNTU_BECOME_PASS') | default(lookup('env', 'UBUNTU_PASS') | default('CHANGE_ME', true), true) }}"
ansible_python_interpreter: "{{ lookup('env', 'ANSIBLE_PYTHON_INTERPRETER') | default('/usr/bin/python3', true) }}"
